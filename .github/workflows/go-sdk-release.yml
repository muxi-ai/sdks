name: Go SDK Release

on:
  push:
    branches: [main]
    paths:
      - 'go/**'
      - '.github/workflows/go-sdk-release.yml'

permissions:
  contents: write

env:
  VERSION_FILE: go/src/.version

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Unit tests
        working-directory: go/src
        run: go test ./...

      - name: Integration tests
        env:
          MUXI_SDK_E2E_SERVER_URL: ${{ secrets.MUXI_SDK_E2E_SERVER_URL }}
          MUXI_SDK_E2E_KEY_ID: ${{ secrets.MUXI_SDK_E2E_KEY_ID }}
          MUXI_SDK_E2E_SECRET_KEY: ${{ secrets.MUXI_SDK_E2E_SECRET_KEY }}
          MUXI_SDK_E2E_FORMATION_ID: ${{ secrets.MUXI_SDK_E2E_FORMATION_ID }}
          MUXI_SDK_E2E_CLIENT_KEY: ${{ secrets.MUXI_SDK_E2E_CLIENT_KEY }}
          MUXI_SDK_E2E_ADMIN_KEY: ${{ secrets.MUXI_SDK_E2E_ADMIN_KEY }}
        working-directory: go/src
        run: |
          : "${MUXI_SDK_E2E_SERVER_URL:?set MUXI_SDK_E2E_SERVER_URL}"
          : "${MUXI_SDK_E2E_KEY_ID:?set MUXI_SDK_E2E_KEY_ID}"
          : "${MUXI_SDK_E2E_SECRET_KEY:?set MUXI_SDK_E2E_SECRET_KEY}"
          : "${MUXI_SDK_E2E_FORMATION_ID:?set MUXI_SDK_E2E_FORMATION_ID}"
          : "${MUXI_SDK_E2E_CLIENT_KEY:?set MUXI_SDK_E2E_CLIENT_KEY}"
          go test -tags=integration ./integration

  release:
    runs-on: ubuntu-latest
    needs: test
    if: "!startsWith(github.event.head_commit.message, 'chore: release')"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
          token: ${{ secrets.MUXI_RELEASE_TOKEN }}

      - name: Compute next version (ScalVer)
        id: version
        run: |
          MAJOR=${MAJOR:-0}
          if [ -f "$VERSION_FILE" ]; then
            CURRENT=$(cat "$VERSION_FILE")
          else
            CURRENT="${MAJOR}.20000101.0"
          fi

          C_MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          C_DATE=$(echo "$CURRENT" | cut -d. -f2)
          C_PATCH=$(echo "$CURRENT" | cut -d. -f3)

          TODAY=$(date -u +%Y%m%d)

          NEXT_MAJOR=$C_MAJOR
          if [ "$TODAY" = "$C_DATE" ]; then
            NEXT_PATCH=$((C_PATCH + 1))
          else
            NEXT_PATCH=0
          fi

          NEXT_VERSION="${NEXT_MAJOR}.${TODAY}.${NEXT_PATCH}"

          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "next=$NEXT_VERSION" >> $GITHUB_OUTPUT
          echo "NEXT_VERSION=$NEXT_VERSION" >> $GITHUB_ENV

      - name: Update version file
        run: |
          echo "$NEXT_VERSION" > "$VERSION_FILE"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$VERSION_FILE"
          if git diff --cached --quiet; then
            echo "No version change to commit"
          else
            git commit -m "chore: release v$NEXT_VERSION"
            git push origin HEAD:main
          fi

      - name: Create tag
        run: |
          TAG="v$NEXT_VERSION"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG exists"
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build artifacts
        run: |
          VERSION="$NEXT_VERSION"
          COMMIT=$(git rev-parse --short HEAD)
          BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          mkdir -p dist
          for OS in linux darwin; do
            for ARCH in amd64 arm64; do
              GOOS=$OS GOARCH=$ARCH go build -ldflags "-X 'main.version=$VERSION' -X 'main.commit=$COMMIT' -X 'main.date=$BUILD_TIME'" -o dist/muxi-go-$OS-$ARCH ./go/src
            done
          done
          for ARCH in amd64 arm64; do
            GOOS=windows GOARCH=$ARCH go build -ldflags "-X 'main.version=$VERSION' -X 'main.commit=$COMMIT' -X 'main.date=$BUILD_TIME'" -o dist/muxi-go-windows-$ARCH.exe ./go/src
          done
          ls -lh dist

      - name: GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.NEXT_VERSION }}
          name: v${{ env.NEXT_VERSION }}
          files: |
            dist/*

      - name: Merge main back to develop
        run: |
          git fetch origin develop
          git checkout develop
          git merge --ff-only origin/main || git merge --no-ff origin/main -m "chore: sync main to develop"
          git push origin develop
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com

      - name: (Optional) Dispatch parent submodule bump
        if: ${{ false }}
        run: echo "Placeholder for dispatch to parent repo to bump submodule pointer"
