name: Go SDK CI (develop)

on:
  push:
    branches: [develop]
    paths:
      - 'go/**'
      - '.github/workflows/go-sdk-ci.yml'
  pull_request:
    branches: [develop]
    paths:
      - 'go/**'
      - '.github/workflows/go-sdk-ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Run unit tests
        working-directory: go/src
        run: go test ./...
